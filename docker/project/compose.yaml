# Prod-like baseline. Dev overlay in compose.dev.yaml.
# ARCHES_FRONTEND_CONFIGURATION_DIR is wired here but only honoured once the
# Stage 6 Arches patch is applied (see docker/base/patches/0001-*.patch).

x-arches: &arches
  image: ${PROJECT_IMAGE:-arches-project}:${PROJECT_TAG:-dev}
  build:
    context: .
    target: prod
  user: "1000:1000"
  env_file:
    - .env
  environment:
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:?set in project .env}
    ARCHES_FRONTEND_CONFIGURATION_DIR: /var/arches/frontend_configuration
    ARCHES_UPLOADED_FILES_DIR: /var/arches/uploadedfiles
    PGHOST: db
    PGPORT: "5432"
    PGUSER: ${PGUSER:-postgres}
    PGPASSWORD: ${PGPASSWORD:-postgres}
    PGDBNAME: ${PGDBNAME:-arches}
    ESHOST: elasticsearch
    ESPORT: "9200"
    RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
    CANTALOUPE_URL: http://cantaloupe:8182
  depends_on:
    db:
      condition: service_healthy
    elasticsearch:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    init:
      condition: service_completed_successfully
  volumes:
    - frontend_configuration:/var/arches/frontend_configuration:ro
    - uploadedfiles:/var/arches/uploadedfiles
    - static_root:/var/arches/static_root
    - logs:/var/arches/logs
    - venv:/venv
  restart: unless-stopped

services:

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDBNAME:-arches}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cantaloupe:
    image: islandora/cantaloupe:latest
    environment:
      CANTALOUPE_BASE_URI: http://cantaloupe:8182
    restart: unless-stopped

  # Single writer for frontend_configuration — overrides the :ro anchor entry.
  init:
    <<: *arches
    restart: "no"
    volumes:
      - frontend_configuration:/var/arches/frontend_configuration
      - uploadedfiles:/var/arches/uploadedfiles
      - static_root:/var/arches/static_root
      - logs:/var/arches/logs
      - venv:/venv
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      - sh
      - -euxc
      - |
        python manage.py migrate --noinput
        python manage.py collectstatic --noinput
        python -c "from arches.apps import generate_frontend_configuration; generate_frontend_configuration()"

  web:
    <<: *arches
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "3", "${WSGI_APP:?set in project .env}"]

  worker:
    <<: *arches
    command: ["celery", "-A", "${CELERY_APP:?set in project .env}", "worker", "-l", "INFO"]

  api:
    <<: *arches
    command: ["gunicorn", "--bind", "0.0.0.0:8001", "--workers", "3", "${WSGI_APP:?set in project .env}"]

volumes:
  postgres_data:
  es_data:
  frontend_configuration:
  uploadedfiles:
  static_root:
  logs:
  venv:
