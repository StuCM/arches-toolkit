# docker/project/compose.yaml — prod-like baseline for local dev.
#
# Projects consume this via `arches-toolkit dev` (or `docker compose -f ...`).
# The dev overlay lives in `compose.dev.yaml`. Project-specific extras can be
# dropped into `compose.extras.yaml` at the project root (auto-included by the
# CLI; see `docs/compose-extras.md`).
#
# Contract points worth reading before editing:
# - Project image reference is indirection — projects build their own image
#   (Stage 3 Dockerfile) with `target: prod` and tag it per the PROJECT_IMAGE
#   env vars below. The toolkit base layer is consumed by that Dockerfile.
# - All writable paths live on named volumes, never on the code tree.
# - All runtime services run as UID 1000.
# - The `init` service is the single writer for frontend_configuration; web /
#   worker / api mount it read-only.
# - NOTE: `ARCHES_FRONTEND_CONFIGURATION_DIR` / `ARCHES_UPLOADED_FILES_DIR` are
#   reserved env vars. Stage 6 of the toolkit plan lands the Arches patch that
#   actually honours them. Until that patch ships, Arches still writes to the
#   hardcoded `frontend_configuration/` path inside the installed package tree.
#   The non-root runtime story therefore *depends on Stage 6* — the env vars
#   are declared here so that the wiring is in place the moment the patch
#   lands, with no compose churn required. Do not try to work around this.

x-arches: &arches
  image: ${PROJECT_IMAGE:-arches-project}:${PROJECT_TAG:-dev}
  build:
    context: .
    target: prod
  user: "1000:1000"
  env_file:
    - .env
  environment:
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:?set in project .env}
    # Stage 6 caveat — see header comment.
    ARCHES_FRONTEND_CONFIGURATION_DIR: /var/arches/frontend_configuration
    ARCHES_UPLOADED_FILES_DIR: /var/arches/uploadedfiles
    PGHOST: db
    PGPORT: "5432"
    PGUSER: ${PGUSER:-postgres}
    PGPASSWORD: ${PGPASSWORD:-postgres}
    PGDBNAME: ${PGDBNAME:-arches}
    ESHOST: elasticsearch
    ESPORT: "9200"
    RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672//
    CANTALOUPE_URL: http://cantaloupe:8182
  depends_on:
    db:
      condition: service_healthy
    elasticsearch:
      condition: service_healthy
    rabbitmq:
      condition: service_healthy
    init:
      condition: service_completed_successfully
  volumes:
    - frontend_configuration:/var/arches/frontend_configuration:ro
    - uploadedfiles:/var/arches/uploadedfiles
    - static_root:/var/arches/static_root
    - logs:/var/arches/logs
    - venv:/venv
  restart: unless-stopped

services:

  db:
    # PLAN.md open question #2: if the F&T postgis image does nothing beyond
    # init.sql, upstream postgis is sufficient. Assumed sufficient here.
    # The toolkit will ship a canonical init.sql (derived from
    # arches/install/init-unix.sql with the `CREATE DATABASE template_postgis`
    # line removed — fork-inventory commit 3522f63d0). Until that file is
    # committed at docker/project/init.sql, projects can drop their own in.
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDBNAME:-arches}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  elasticsearch:
    # TODO(verify): Arches 8.1 upstream compose pins a specific 8.x minor.
    # 8.12.2 is a conservative pick; bump to match whatever upstream Arches
    # `docker-compose.yml` uses once confirmed.
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms1g -Xmx1g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cantaloupe:
    # TODO(verify): cantaloupe image source. `islandora/cantaloupe` is the
    # most widely published community image; the old F&T toolkit may have
    # used a different one. Confirm with the Arches deployment team before
    # this lands in a pilot project.
    image: islandora/cantaloupe:latest
    environment:
      CANTALOUPE_BASE_URI: http://cantaloupe:8182
    restart: unless-stopped

  init:
    <<: *arches
    restart: "no"
    # init is the single writer — mount frontend_configuration read-write,
    # overriding the rw-masked entry inherited from the anchor. All other
    # services mount it :ro.
    volumes:
      - frontend_configuration:/var/arches/frontend_configuration
      - uploadedfiles:/var/arches/uploadedfiles
      - static_root:/var/arches/static_root
      - logs:/var/arches/logs
      - venv:/venv
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command:
      - sh
      - -euxc
      - |
        python manage.py migrate --noinput
        python manage.py collectstatic --noinput
        python -c "from arches.apps import generate_frontend_configuration; generate_frontend_configuration()"

  web:
    <<: *arches
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--workers", "3", "${WSGI_APP:?set in project .env}"]

  worker:
    <<: *arches
    command: ["celery", "-A", "${CELERY_APP:?set in project .env}", "worker", "-l", "INFO"]

  api:
    <<: *arches
    command: ["gunicorn", "--bind", "0.0.0.0:8001", "--workers", "3", "${WSGI_APP:?set in project .env}"]

volumes:
  postgres_data:
  es_data:
  frontend_configuration:
  uploadedfiles:
  static_root:
  logs:
  venv:
