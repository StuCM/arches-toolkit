{{- if .Values.tiers.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arches.fullname" . }}-api
  labels:
    tier: api
    {{- include "arches.labels" . | nindent 4 }}
spec:
  replicas: {{ default .Values.replicaCount .Values.api.replicaCount }}
  selector:
    matchLabels:
      tier: api
      {{- include "arches.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        tier: api
        {{- include "arches.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/configmap-env: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
    spec:
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      serviceAccountName: {{ include "arches.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          envFrom:
          - configMapRef:
              name: {{ template "arches.fullname" . }}-env
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ default .Values.image.repository .Values.api.image.repository }}:{{ default .Chart.AppVersion .Values.api.image.tag | default .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -euxc
            - exec gunicorn --bind 0.0.0.0:8001 --workers {{ .Values.gunicornWorkers | default 1 }} "${WSGI_APP}"
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          #livenessProbe:
          #  httpGet:
          #    path: /
          #    port: http
          #  timeoutSeconds: 5
          #  initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
          #readinessProbe:
          #  httpGet:
          #    path: /
          #    port: http
          #  timeoutSeconds: 5
          #  initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
          volumeMounts:
          - name: frontend-configuration
            mountPath: /var/arches/frontend_configuration
            readOnly: true
          - name: uploadedfiles
            mountPath: /var/arches/uploadedfiles
          {{- if or .Values.mappingJsonConfigMap .Values.mappingJson }}
          - name: mapping-file
            mountPath: "/data_root"
            readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
          {{- if or .Values.mappingJsonConfigMap .Values.mappingJson }}
          - name: WELL_KNOWN_MAPPING_FILE
            value: /data_root/mapping.json
          {{- end }}
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                key: {{ default .Values.postgresqlPasswordKey "postgres-password" }}
                name: {{ printf "%s-postgresql" .Release.Name }}
          - name: COUCHDB_PASS
            value: UNSET
            #alueFrom:
            # secretKeyRef:
            #   key: adminPassword
            #   name: {{ printf "%s-couchdb" .Release.Name }}
          - name: CELERY_BROKER_URL
            valueFrom:
              secretKeyRef:
                key: celery-broker-url
                name: {{ template "arches.fullname" $ }}
          - name: RABBITMQ_URL
            valueFrom:
              secretKeyRef:
                key: celery-broker-url
                name: {{ template "arches.fullname" $ }}
          {{- range $env, $value := .Values.secretEnv }}
          - name: {{ $env }}
            valueFrom:
              secretKeyRef:
                key: {{ $env }}
                name: {{ template "arches.fullname" $ }}-env
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      volumes:
      - name: frontend-configuration
        emptyDir: {}
      - name: uploadedfiles
      {{- if .Values.persistence.uploadedfiles.enabled }}
        persistentVolumeClaim:
          claimName: {{ default (printf "%s-uploadedfiles" (include "arches.fullname" .)) .Values.persistence.uploadedfiles.existingClaim }}
      {{- else }}
        emptyDir: {}
      {{- end }}
      {{- if .Values.mappingJsonConfigMap }}
      - name: mapping-file
        configMap:
          name: {{ .Values.mappingJsonConfigMap }}
      {{- else if .Values.mappingJson }}
      - name: mapping-file
        configMap:
          name: {{ template "arches.fullname" $ }}-mapping
      {{- end }}
{{- end }}
