# Dev overlay for compose.yaml. Use via `arches-toolkit dev`.

x-arches-dev: &arches-dev
  build:
    context: .
    dockerfile: ${ARCHES_TOOLKIT_DOCKERFILE}
    target: dev
    args:
      ARCHES_TOOLKIT_IMAGE: ${ARCHES_TOOLKIT_IMAGE:-ghcr.io/flaxandteal/arches-toolkit}
      ARCHES_TOOLKIT_TAG: ${ARCHES_TOOLKIT_TAG:-latest-arches-stable-8.1.0}
      PROJECT_NAME: ${PROJECT_NAME:?set in project .env}
      PROJECT_PACKAGE: ${PROJECT_PACKAGE:-${PROJECT_NAME}}
  environment:
    DEBUG: "True"
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
    # Dev override: keep frontend_configuration in the bind-mounted source tree
    # so TypeScript (tsconfig.json, hardcoded path) can read it. Prod still
    # uses /var/arches/frontend_configuration via the base compose.yaml value.
    ARCHES_FRONTEND_CONFIGURATION_DIR: /app/frontend_configuration
  volumes:
    - .:/app
    - venv:/venv
    # Shadow the host's node_modules: webpack writes here as uid 1000; any
    # stale host-side tree (e.g. left over from pre-toolkit tooling run as
    # root) never reaches the container.
    - node_modules:/app/node_modules
    - frontend_configuration:/var/arches/frontend_configuration:ro
    - uploadedfiles:/var/arches/uploadedfiles
    - static_root:/var/arches/static_root
    - logs:/var/arches/logs
  develop:
    watch:
      - action: sync
        path: .
        target: /app
        ignore:
          - .git/
          - .venv/
          - node_modules/
          - "**/__pycache__/"
          - "**/*.pyc"
      - action: rebuild
        path: ./pyproject.toml
      - action: rebuild
        path: ./uv.lock

services:

  # Dev-only postgres tuning: trades durability for speed. Do NOT use in prod.
  db:
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off

  init:
    <<: *arches-dev
    # Skip collectstatic in dev: runserver serves STATICFILES_DIRS directly and
    # webpack-dev-server serves bundles on :9000. collectstatic races webpack's
    # HMR rewrites of hashed bundles and crashes init.
    # Warm-start fast path: probe django_migrations via psycopg2 (sub-second)
    # and skip Django boot entirely if the schema is already applied.
    command:
      - sh
      - -euc
      - |
        # Overlay-model apps: develop-mode apps are installed from their
        # declared source (pypi/git) at image build time via uv sync. The
        # compose.apps.yaml overlay bind-mounts their local clone source
        # over /venv/.../site-packages/<name>, so edits show up without a
        # runtime install. Nothing to do here beyond the frontend config
        # regen below. $$ escapes compose variable interpolation.

        PROBE='
        import os, sys, psycopg2
        try:
            c = psycopg2.connect(host=os.environ["PGHOST"], port=int(os.environ.get("PGPORT","5432")), user=os.environ["PGUSER"], password=os.environ["PGPASSWORD"], dbname=os.environ["PGDBNAME"])
            cur = c.cursor()
            cur.execute("SELECT 1 FROM django_migrations LIMIT 1")
            sys.exit(0 if cur.fetchone() else 1)
        except Exception:
            sys.exit(1)
        '
        REGEN='
        import django
        django.setup()
        from arches.app.utils.frontend_configuration_utils.generate_frontend_configuration import generate_frontend_configuration
        generate_frontend_configuration()
        print("init: regenerated frontend_configuration")
        '
        if python -c "$$PROBE" 2>/dev/null; then
          echo "init: db already initialized, skipping migrate/createcachetable"
          # migrate on the cold-start path triggers app.ready() which calls
          # generate_frontend_configuration() — that refreshes webpack-metadata.json
          # so webpack can resolve the paths of installed apps. Warm start skips
          # migrate, so we must regenerate explicitly — otherwise webpack reads
          # stale paths and fails to resolve apps that have moved (e.g. a package
          # that switched from release → develop mode is now at /opt/apps/<name>
          # rather than /venv/lib/.../site-packages/<name>).
          python -c "$$REGEN" 2>&1 || echo "init: frontend_configuration regen failed (run arches-toolkit setup-db if DB is incomplete)"
        else
          python manage.py migrate --noinput
          python manage.py createcachetable
        fi

  cantaloupe:
    ports:
      - "8182:8182"
      
  web:
    <<: *arches-dev
    command:
      - sh
      - -euxc
      - |
        python -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "5678:5678"

  worker:
    <<: *arches-dev
    command: ["celery", "-A", "${CELERY_APP:?set in project .env}", "worker", "-l", "DEBUG"]

  api:
    <<: *arches-dev
    command: ["python", "manage.py", "runserver", "0.0.0.0:8001"]
    ports:
      - "8001:8001"

  webpack:
    <<: *arches-dev
    # Run as root so we can chown the freshly-created node_modules volume
    # (Docker initialises named volumes as root:root); then drop to `app` for
    # the actual install/serve. node_modules is a mount point — no `rm -rf`.
    user: "0:0"
    # x-arches-dev doesn't inherit depends_on from x-arches (different anchor);
    # without this, webpack boots before init finishes regenerating
    # webpack-metadata.json and reads a stale file (e.g. ROOT_DIR still
    # pointing at /opt/arches after the image removed that path).
    depends_on:
      init:
        condition: service_completed_successfully
    command:
      - sh
      - -euxc
      - |
        chown -R app:app /app/node_modules
        # $$ escapes compose variable interpolation so the $ reaches the shell.
        exec su app -s /bin/sh -c '
          cd /app
          STAMP=node_modules/.arches-toolkit-install-stamp
          # Reinstall if stamp is missing OR if package.json/lock is newer
          # than it — so editing package.json + `arches-toolkit restart
          # webpack` picks up new deps without any manual steps.
          needs_install=0
          if [ ! -f "$$STAMP" ]; then
            needs_install=1
          elif [ package.json -nt "$$STAMP" ]; then
            needs_install=1
          elif [ -f package-lock.json ] && [ package-lock.json -nt "$$STAMP" ]; then
            needs_install=1
          fi
          if [ "$$needs_install" = "1" ]; then
            npm install --no-audit --no-fund
            touch "$$STAMP"
          fi
          exec npm run start
        '
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  node_modules:
