# Dev overlay for compose.yaml. Use via `arches-toolkit dev`.

x-arches-dev: &arches-dev
  build:
    context: .
    dockerfile: ${ARCHES_TOOLKIT_DOCKERFILE}
    target: dev
    args:
      ARCHES_TOOLKIT_IMAGE: ${ARCHES_TOOLKIT_IMAGE:-ghcr.io/flaxandteal/arches-toolkit}
      ARCHES_TOOLKIT_TAG: ${ARCHES_TOOLKIT_TAG:-latest-arches-stable-8.1.0}
      PROJECT_NAME: ${PROJECT_NAME:?set in project .env}
      PROJECT_PACKAGE: ${PROJECT_PACKAGE:-${PROJECT_NAME}}
  environment:
    DEBUG: "True"
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
    # Dev override: keep frontend_configuration in the bind-mounted source tree
    # so TypeScript (tsconfig.json, hardcoded path) can read it. Prod still
    # uses /var/arches/frontend_configuration via the base compose.yaml value.
    ARCHES_FRONTEND_CONFIGURATION_DIR: /app/frontend_configuration
  volumes:
    - .:/app
    - venv:/venv
    - frontend_configuration:/var/arches/frontend_configuration:ro
    - uploadedfiles:/var/arches/uploadedfiles
    - static_root:/var/arches/static_root
    - logs:/var/arches/logs
  develop:
    watch:
      - action: sync
        path: .
        target: /app
        ignore:
          - .git/
          - .venv/
          - node_modules/
          - "**/__pycache__/"
          - "**/*.pyc"
      - action: rebuild
        path: ./pyproject.toml
      - action: rebuild
        path: ./uv.lock

services:

  # init needs rw on frontend_configuration — override the :ro anchor entry.
  init:
    <<: *arches-dev
    volumes:
      - .:/app
      - venv:/venv
      - frontend_configuration:/var/arches/frontend_configuration
      - uploadedfiles:/var/arches/uploadedfiles
      - static_root:/var/arches/static_root
      - logs:/var/arches/logs

  web:
    <<: *arches-dev
    command:
      - sh
      - -euxc
      - |
        python -m debugpy --listen 0.0.0.0:5678 manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
      - "5678:5678"

  worker:
    <<: *arches-dev
    command: ["celery", "-A", "${CELERY_APP:?set in project .env}", "worker", "-l", "DEBUG"]

  api:
    <<: *arches-dev
    command: ["python", "manage.py", "runserver", "0.0.0.0:8001"]
    ports:
      - "8001:8001"

  webpack:
    <<: *arches-dev
    command:
      - sh
      - -euxc
      - |
        if [ ! -f node_modules/.arches-toolkit-install-stamp ]; then
          rm -rf node_modules
          npm install --no-audit --no-fund
          touch node_modules/.arches-toolkit-install-stamp
        fi
        npm run start
    ports:
      - "9000:9000"
    restart: unless-stopped
